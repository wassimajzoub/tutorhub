{% extends 'base.html' %}

{% block title %}Login - TutorHub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">
        <div class="glass-card p-8">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center" style="background: linear-gradient(135deg, #6366f1, #a855f7);">
                    <span class="text-white font-bold text-2xl">T</span>
                </div>
                <h1 class="text-3xl font-bold text-txt-primary">Welcome Back</h1>
                <p class="text-txt-secondary mt-2">Sign in to your TutorHub account</p>
            </div>

            {% if errors %}
            <div class="bg-red-900/20 border border-red-500/30 text-red-400 px-4 py-3 rounded-lg mb-6 flex items-start gap-2">
                <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0 mt-0.5"></i>
                <div>
                    {% for error in errors %}
                    <p class="text-sm">{{ error }}</p>
                    {% endfor %}
                </div>
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-txt-secondary mb-1">Email Address</label>
                    <input type="email" id="email" name="email" required
                        class="dark-input w-full px-4 py-2.5 rounded-lg"
                        placeholder="john@example.com">
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label for="password" class="block text-sm font-medium text-txt-secondary">Password</label>
                        <a href="#" class="text-xs text-primary-light hover:text-primary transition-colors" onclick="alert('Password reset coming soon! Contact your admin for now.'); return false;">Forgot password?</a>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required
                            class="dark-input w-full px-4 py-2.5 rounded-lg pr-12"
                            placeholder="••••••••">
                        <button type="button" class="password-toggle" onclick="togglePassword('password')" aria-label="Toggle password visibility">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit"
                    class="cta-btn w-full text-white font-semibold py-2.5 px-4 rounded-lg mt-2">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-txt-secondary text-sm">Don't have an account?
                    <a href="{{ url_for('auth.signup') }}" class="text-primary-light hover:text-primary font-semibold">
                        Create one
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
