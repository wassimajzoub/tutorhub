{% extends 'base.html' %}

{% block title %}Login - TutorHub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">
        <div class="glass-card p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-txt-primary">Welcome Back</h1>
                <p class="text-txt-secondary mt-2">Sign in to your TutorHub account</p>
            </div>

            {% if errors %}
            <div class="bg-red-900/20 border border-red-500/30 text-red-400 px-4 py-3 rounded-lg mb-6">
                {% for error in errors %}
                <p class="text-sm">{{ error }}</p>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-txt-secondary mb-1">Email Address</label>
                    <input type="email" id="email" name="email" required
                        class="dark-input w-full px-4 py-2 rounded-lg"
                        placeholder="john@example.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-txt-secondary mb-1">Password</label>
                    <input type="password" id="password" name="password" required
                        class="dark-input w-full px-4 py-2 rounded-lg"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="cta-btn w-full text-white font-semibold py-2 px-4 rounded-lg mt-6">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-txt-secondary text-sm">Don't have an account?
                    <a href="{{ url_for('auth.signup') }}" class="text-primary-light hover:text-primary font-semibold">
                        Create one
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
