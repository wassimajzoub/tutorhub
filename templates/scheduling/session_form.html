{% extends "base.html" %}

{% block title %}Schedule Session - TutorHub{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="glass-card p-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold gradient-text">Schedule a New Session</h1>
            <p class="text-txt-secondary mt-2">Create a new tutoring session with one of your students.</p>
        </div>

        <form method="POST" action="{{ url_for('scheduling.add_session') }}" class="space-y-6">
            <!-- Student Selection -->
            <div>
                <label for="student_id" class="block text-sm font-medium text-txt-secondary">Student</label>
                <select
                    id="student_id"
                    name="student_id"
                    required
                    class="mt-2 block w-full px-4 py-2 dark-input rounded-lg"
                >
                    <option value="">Select a student...</option>
                    {% for student in students %}
                    <option value="{{ student.id }}">{{ student.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Date -->
            <div>
                <label for="session_date" class="block text-sm font-medium text-txt-secondary">Date</label>
                <input
                    type="date"
                    id="session_date"
                    name="session_date"
                    required
                    class="mt-2 block w-full px-4 py-2 dark-input rounded-lg"
                >
            </div>

            <!-- Time -->
            <div>
                <label for="session_time" class="block text-sm font-medium text-txt-secondary">Time</label>
                <input
                    type="time"
                    id="session_time"
                    name="session_time"
                    required
                    class="mt-2 block w-full px-4 py-2 dark-input rounded-lg"
                >
            </div>

            <!-- Duration -->
            <div>
                <label for="duration" class="block text-sm font-medium text-txt-secondary">Duration</label>
                <select
                    id="duration"
                    name="duration"
                    required
                    class="mt-2 block w-full px-4 py-2 dark-input rounded-lg"
                >
                    <option value="">Select duration...</option>
                    {% for duration in durations %}
                    <option value="{{ duration }}">{{ duration }} minutes</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Session Type -->
            <div>
                <label class="block text-sm font-medium text-txt-secondary mb-3">Session Type</label>
                <div class="space-y-3">
                    <div class="flex items-center">
                        <input
                            type="radio"
                            id="type_online"
                            name="session_type"
                            value="online"
                            required
                            class="h-4 w-4 text-primary border-surface-200 focus:ring-primary cursor-pointer accent-primary"
                        >
                        <label for="type_online" class="ml-3 text-txt-primary cursor-pointer">Online</label>
                    </div>
                    <div class="flex items-center">
                        <input
                            type="radio"
                            id="type_in_person"
                            name="session_type"
                            value="in-person"
                            required
                            class="h-4 w-4 text-primary border-surface-200 focus:ring-primary cursor-pointer accent-primary"
                        >
                        <label for="type_in_person" class="ml-3 text-txt-primary cursor-pointer">In-Person</label>
                    </div>
                </div>
            </div>

            <!-- Meeting Link (for online sessions) -->
            <div id="meeting_link_container" style="display: none;">
                <label for="meeting_link" class="block text-sm font-medium text-txt-secondary">Meeting Link</label>
                <input
                    type="url"
                    id="meeting_link"
                    name="meeting_link"
                    placeholder="https://zoom.us/j/..."
                    class="mt-2 block w-full px-4 py-2 dark-input rounded-lg"
                >
            </div>

            <!-- Location (for in-person sessions) -->
            <div id="location_container" style="display: none;">
                <label for="location" class="block text-sm font-medium text-txt-secondary">Location</label>
                <input
                    type="text"
                    id="location"
                    name="location"
                    placeholder="Enter location or address..."
                    class="mt-2 block w-full px-4 py-2 dark-input rounded-lg"
                >
            </div>

            <!-- Action Buttons -->
            <div class="section-divider"></div>
            <div class="flex justify-end space-x-3 pt-2">
                <a href="{{ url_for('scheduling.sessions_list') }}" class="px-6 py-2 ghost-btn text-txt-secondary rounded-lg font-medium hover:text-txt-primary transition">
                    Cancel
                </a>
                <button
                    type="submit"
                    class="px-6 py-2 cta-btn text-white rounded-lg font-medium transition"
                >
                    Schedule Session
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const typeRadios = document.querySelectorAll('input[name="session_type"]');
    const meetingLinkContainer = document.getElementById('meeting_link_container');
    const locationContainer = document.getElementById('location_container');

    function updateSessionTypeFields() {
        const selectedType = document.querySelector('input[name="session_type"]:checked')?.value;
        if (selectedType === 'online') {
            meetingLinkContainer.style.display = 'block';
            locationContainer.style.display = 'none';
        } else if (selectedType === 'in-person') {
            meetingLinkContainer.style.display = 'none';
            locationContainer.style.display = 'block';
        }
    }

    typeRadios.forEach(radio => {
        radio.addEventListener('change', updateSessionTypeFields);
    });

    updateSessionTypeFields();
});
</script>
{% endblock %}
