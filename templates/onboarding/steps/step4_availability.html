<!-- Step 4: Availability -->
<div class="text-center mb-8">
    <div class="w-16 h-16 rounded-2xl mx-auto mb-4 flex items-center justify-center" style="background: linear-gradient(135deg, #6366f1, #a855f7);">
        <i data-lucide="calendar-clock" class="w-8 h-8 text-white"></i>
    </div>
    <h2 class="text-2xl font-bold text-txt-primary">Set Your Schedule</h2>
    <p class="text-txt-secondary mt-2">When are you available for sessions? Toggle days on/off and set your hours.</p>
</div>

<form method="POST" action="{{ url_for('onboarding.wizard', step=4) }}" class="space-y-6">
    <div class="space-y-3">
        {% for day_idx in range(7) %}
        {% set day_name = day_names[day_idx] %}
        <div class="bg-surface-100/60 rounded-lg p-4 border border-surface-200/30 hover:border-primary/20 transition">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input
                        type="checkbox"
                        id="day_{{ day_idx }}_enabled"
                        name="day_{{ day_idx }}_enabled"
                        value="on"
                        {% if avail_dict.get(day_idx, {}).get('enabled') %}checked{% endif %}
                        class="h-5 w-5 rounded border-surface-200 focus:ring-primary cursor-pointer accent-primary"
                        onchange="toggleDayInputs({{ day_idx }})"
                    >
                    <label for="day_{{ day_idx }}_enabled" class="ml-3 font-semibold text-txt-primary cursor-pointer">
                        {{ day_name }}
                    </label>
                </div>

                <div id="day_{{ day_idx }}_inputs" class="flex items-center gap-2" {% if not avail_dict.get(day_idx, {}).get('enabled') %}style="opacity: 0.3; pointer-events: none;"{% endif %}>
                    <input
                        type="time"
                        id="day_{{ day_idx }}_start"
                        name="day_{{ day_idx }}_start"
                        value="{{ avail_dict.get(day_idx, {}).get('start', '09:00') }}"
                        class="dark-input px-3 py-1.5 rounded-lg text-sm w-28"
                    >
                    <span class="text-txt-muted text-sm">to</span>
                    <input
                        type="time"
                        id="day_{{ day_idx }}_end"
                        name="day_{{ day_idx }}_end"
                        value="{{ avail_dict.get(day_idx, {}).get('end', '17:00') }}"
                        class="dark-input px-3 py-1.5 rounded-lg text-sm w-28"
                    >
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Quick set -->
    <div class="flex flex-wrap gap-2">
        <button type="button" onclick="quickSetWeekdays()" class="text-xs px-3 py-1.5 rounded-full border border-primary/20 text-primary-light hover:bg-primary/10 transition-colors">
            Weekdays 9-5
        </button>
        <button type="button" onclick="quickSetAll()" class="text-xs px-3 py-1.5 rounded-full border border-primary/20 text-primary-light hover:bg-primary/10 transition-colors">
            Every day
        </button>
        <button type="button" onclick="quickClearAll()" class="text-xs px-3 py-1.5 rounded-full border border-surface-200/30 text-txt-muted hover:bg-surface-100 transition-colors">
            Clear all
        </button>
    </div>

    <!-- Navigation Buttons -->
    <div class="section-divider"></div>
    <div class="flex items-center justify-between pt-2">
        <div class="flex items-center gap-4">
            <a href="{{ url_for('onboarding.wizard', step=3) }}" class="text-sm text-txt-secondary hover:text-txt-primary transition-colors inline-flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Back
            </a>
            <button type="submit" name="action" value="skip" class="text-sm text-txt-muted hover:text-txt-secondary transition-colors">
                Skip
            </button>
        </div>
        <button type="submit" name="action" value="next" class="cta-btn px-6 py-2.5 text-white rounded-lg font-medium inline-flex items-center gap-2">
            Continue
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
    </div>
</form>

<script>
function toggleDayInputs(dayIdx) {
    const checkbox = document.getElementById(`day_${dayIdx}_enabled`);
    const inputsDiv = document.getElementById(`day_${dayIdx}_inputs`);
    if (checkbox.checked) {
        inputsDiv.style.opacity = '1';
        inputsDiv.style.pointerEvents = 'auto';
    } else {
        inputsDiv.style.opacity = '0.3';
        inputsDiv.style.pointerEvents = 'none';
    }
}

function quickSetWeekdays() {
    for (let i = 0; i < 7; i++) {
        const cb = document.getElementById(`day_${i}_enabled`);
        cb.checked = (i < 5); // Mon-Fri
        const startInput = document.getElementById(`day_${i}_start`);
        const endInput = document.getElementById(`day_${i}_end`);
        if (i < 5) {
            startInput.value = '09:00';
            endInput.value = '17:00';
        }
        toggleDayInputs(i);
    }
}

function quickSetAll() {
    for (let i = 0; i < 7; i++) {
        const cb = document.getElementById(`day_${i}_enabled`);
        cb.checked = true;
        document.getElementById(`day_${i}_start`).value = '09:00';
        document.getElementById(`day_${i}_end`).value = '17:00';
        toggleDayInputs(i);
    }
}

function quickClearAll() {
    for (let i = 0; i < 7; i++) {
        document.getElementById(`day_${i}_enabled`).checked = false;
        toggleDayInputs(i);
    }
}
</script>
